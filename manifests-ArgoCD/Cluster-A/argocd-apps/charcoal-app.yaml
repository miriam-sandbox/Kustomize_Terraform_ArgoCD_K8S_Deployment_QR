apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: charcoal-cluster-a
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/your-repo.git' # Replace with your URL
    path: manifests-ArgoCD/Cluster-A/overlays/charcoal
    targetRevision: HEAD
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: charcoal-namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true