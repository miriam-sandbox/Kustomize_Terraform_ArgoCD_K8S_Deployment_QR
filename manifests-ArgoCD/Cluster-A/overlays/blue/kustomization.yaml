apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/blue

# Adds a prefix or namespace specific to Cluster-A
namespace: blue-namespace
namePrefix: cluster-a-

# Built-in image tag management
images:
  - name: argocd-trf-k8s-demo-blue
    newName: miriamoranu/argocd-trf-k8s-demo-blue
    newTag: v1

patches:
  - target:
      kind: Service
      name: blue-service
    patch: |-
      - op: replace
        path: /spec/ports/0/port
        value: 8081
      - op: replace
        path: /spec/type
        value: LoadBalancer