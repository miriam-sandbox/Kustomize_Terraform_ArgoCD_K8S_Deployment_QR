apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../../base/charcoal

# Adds a prefix or namespace specific to Cluster-A
namespace: charcoal-namespace
namePrefix: cluster-a-

# Built-in image tag management
images:
  - name: argocd-trf-k8s-demo-charcoal
    newName: miriamoranu/argocd-trf-k8s-demo-charcoal
    newTag: v1

patches:
  - target:
      kind: Service
      name: charcoal-service
    patch: |-
      - op: replace
        path: /spec/ports/0/port
        value: 8082
      - op: replace
        path: /spec/type
        value: LoadBalancer